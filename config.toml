[steps]
small_hz = 100
medium_hz = 1000
large_hz = 5000

[volume]
step_percent = 10

[audio]
# Drop/fade decoded live playback audio to hide receiver/audio startup transients.
startup_mute_ms = 100
startup_fade_in_ms = 50
stop_fade_out_ms = 50

[live]
# Set true only for trusted local interactive use.
allow_live = true
# 0 means unlimited.
duration_seconds = 0
max_frames = 0

[receivers]
# Keep restricted=true for normal local-radio work.
# Set restricted=false only when you explicitly want unrestricted receiver addresses.
restricted = false
allowed = ["10.0.0.41:8073", "10.0.0.40:8073", "10.0.0.42:8073"]

[presets]
# Durable radio and receiver-register presets live here.
file = "presets.toml"

[tuning]
# CW user frequency is passband center; radio frequency adds this signed offset.
cw_offset_hz = -800

[tuning.mode_passbands.am]
low_cut_hz = -5000
high_cut_hz = 5000

[tuning.mode_passbands.usb]
low_cut_hz = 0
high_cut_hz = 3000

[tuning.mode_passbands.lsb]
low_cut_hz = -3000
high_cut_hz = 0

[tuning.mode_passbands.cw]
low_cut_hz = 650
high_cut_hz = 1050

[tuning.mode_steps.am]
pairs = [[5000, 1000], [10000, 1000]]

[tuning.mode_steps.usb]
pairs = [[1000, 100], [2500, 250], [5000, 500]]

[tuning.mode_steps.lsb]
pairs = [[1000, 100], [2500, 250], [5000, 500]]

[tuning.mode_steps.cw]
pairs = [[100, 10], [500, 50], [1000, 100]]

[startup]
# mode can be "last", "default", or "preset".
mode = "last"
preset = 1
state_file = "state.json"
# Start background playback automatically when [live].allow_live is true.
playback = true

[default_state]
host = "10.0.0.41"
port = 8073
frequency_khz = 5000.0
mode = "am"
low_cut_hz = -5000
high_cut_hz = 5000

[keys]
# Direct key actions remain configurable. Built-in prefix keymaps are:
# p <register> = recall preset; s <register> = store minimal preset;
# S <register> = store full preset; r <receiver-register> = switch receiver.
# Registers are 0..9 and a..z. Receiver registers use stored add-receiver entries
# when any exist; otherwise they map to [receivers].allowed order.
"right" = "tune-step +mode"
"l" = "tune-step +mode"
"left" = "tune-step -mode"
"h" = "tune-step -mode"
"shift-right" = "tune-step +mode-small"
"shift-l" = "tune-step +mode-small"
"shift-left" = "tune-step -mode-small"
"shift-h" = "tune-step -mode-small"
"t" = "step-pair +1"
"shift-t" = "step-pair -1"
"up" = "volume-step +10"
"k" = "volume-step +10"
"down" = "volume-step -10"
"j" = "volume-step -10"
":" = "command-mode"
# Safe quit: requests background stop before exiting the TUI.
"q" = "quit"
